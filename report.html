<!DOCTYPE html>
<html>
<head>
    <title>Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
    <h2 class="text-center mb-4">📊 Salary Report</h2>

    <form method="POST" class="card p-3 shadow mb-4">
        <input class="form-control mb-2" name="month" placeholder="Month" required>
        <input class="form-control mb-2" name="deduction" placeholder="Deduction per Leave" required>
        <button class="btn btn-primary">Generate Report</button>
    </form>

    {% if results %}
    <div class="card shadow p-3">
        <table class="table table-striped">
            <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Salary</th>
                    <th>Present</th>
                    <th>Leaves</th>
                    <th>Deduction</th>
                    <th>Final Salary</th>
                </tr>
            </thead>

            <tbody>
                {% for r in results %}
                <tr>
                    <td>{{r[0]}}</td>
                    <td>{{r[1]}}</td>
                    <td>{{r[2]}}</td>
                    <td>{{r[3]}}</td>
                    <td>{{r[4]}}</td>
                    <td>{{r[5]}}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <a href="/download" class="btn btn-success mt-2">⬇ Download Excel</a>
    </div>
    {% endif %}
</div>

</body>
</html>
