<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report — BK Agencies</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #1a0a14;
            --surface: #251020;
            --border: #4a1a38;
            --accent: #ff4d8d;
            --accent2: #ff80b5;
            --text: #fdf0f5;
            --muted: #b06080;
            --input-bg: #160a10;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,77,141,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        nav {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 16px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-logo span {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 12px;
        }
        .btn-back {
            padding: 8px 16px;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            transition: all 0.2s;
        }
        .btn-back:hover { border-color: var(--accent); color: var(--accent); }

        main {
            padding: 40px 24px;
            max-width: 520px;
            margin: 0 auto;
        }
        .page-title {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .page-sub { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
        }
        .field { margin-bottom: 22px; }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 10px;
        }
        input[type="month"],
        input[type="number"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 13px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,77,141,0.1);
        }
        input::placeholder { color: var(--muted); }
        .helper { font-size: 12px; color: var(--muted); margin-top: 6px; }

        .btn-generate {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(255,77,141,0.3);
        }
        .btn-generate:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,77,141,0.45); }

        .info-box {
            margin-top: 24px;
            background: rgba(255,77,141,0.05);
            border: 1px solid rgba(255,77,141,0.15);
            border-radius: 12px;
            padding: 16px 18px;
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
        }
        .info-box strong { color: var(--accent); }

        @media (max-width: 480px) {
            main { padding: 24px 16px; }
            .card { padding: 24px 20px; }
            .page-title { font-size: 22px; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">
        <span>📋</span> BK Agencies
    </div>
    <a href="/dashboard" class="btn-back">← Dashboard</a>
</nav>

<main>
    <h1 class="page-title">Salary Report</h1>
    <p class="page-sub">Generate and download the monthly salary report as Excel</p>

    <div class="card">
        <form method="POST">
            <div class="field">
                <label>Month</label>
                <input type="month" name="month" required>
            </div>
            <div class="field">
                <label>Deduction per Leave Day</label>
                <input type="number" name="deduction" placeholder="e.g. 500" min="0" step="0.01" required>
                <p class="helper">Amount in ₹ deducted for each leave day</p>
            </div>
            <button type="submit" class="btn-generate">⬇ Download Excel Report</button>
        </form>

        <div class="info-box">
            <strong>How it works:</strong><br>
            The report calculates each employee's <strong>present days</strong>, <strong>leave days</strong>,
            total deduction, and final salary — then downloads as an <strong>.xlsx</strong> file.
        </div>
    </div>
</main>

</body>
</html>
