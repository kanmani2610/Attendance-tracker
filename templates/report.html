<!DOCTYPE html>
<html>
<head>
    <title>Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📊 Salary Report</h2>
        <a href="/dashboard" class="btn btn-outline-secondary btn-sm">← Back</a>
    </div>

    <!-- ✅ FIX: use input type="month" so format matches "2025-01" in DB -->
    <form method="POST" class="card p-3 shadow mb-4">
        <label class="form-label fw-bold">Select Month</label>
        <input type="month" class="form-control mb-2" name="month" required>

        <label class="form-label fw-bold">Deduction per Leave (₹)</label>
        <input type="number" class="form-control mb-2" name="deduction"
               placeholder="e.g. 500" min="0" required>

        <button class="btn btn-primary">⬇ Generate & Download Excel</button>
    </form>

    <p class="text-muted text-center">The report will download as an Excel file automatically.</p>
</div>

</body>
</html>
