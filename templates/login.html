<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — BK Agencies</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #1a0a14;
            --card: #251020;
            --border: #4a1a38;
            --accent: #ff4d8d;
            --accent2: #ff80b5;
            --text: #fdf0f5;
            --muted: #b06080;
            --input-bg: #160a10;
            --error: #ff4d6d;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: -200px; right: -200px;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(255,77,141,0.15) 0%, transparent 70%);
            pointer-events: none;
        }
        body::after {
            content: '';
            position: fixed;
            bottom: -200px; left: -200px;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(255,128,181,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1);
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        h1 {
            font-family: 'Syne', sans-serif;
            font-size: 28px;
            font-weight: 800;
            color: var(--text);
            margin-bottom: 6px;
        }
        .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 36px; }
        .field { margin-bottom: 18px; }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 16px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255,77,141,0.1);
        }
        input::placeholder { color: var(--muted); }
        .error-box {
            background: rgba(255,77,109,0.1);
            border: 1px solid rgba(255,77,109,0.3);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--error);
            font-size: 13px;
            margin-bottom: 20px;
        }
        .btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), #ff80b5);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Syne', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(255,77,141,0.3);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(255,77,141,0.4); }
        .btn:active { transform: translateY(0); }
        @media (max-width: 480px) {
            .card { padding: 32px 24px; }
            h1 { font-size: 24px; }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <div class="logo-icon">📋</div>
            AttendPro
        </div>
        <h1>Welcome back</h1>
        <p class="subtitle">Sign in to manage attendance</p>

        {% if error %}
        <div class="error-box">⚠ {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="field">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required autofocus>
            </div>
            <div class="field">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn">Sign In →</button>
        </form>
    </div>
</body>
</html>
